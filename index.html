<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ターゲット1900 タイピング＆ガチャ</title>
    
    <style>
        /* 🌌 1. 画面全体の背景を美しいグラデーションに */
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: #f8fafc;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 📦 メインのコンテンツを囲む中央の白いコンテナ */
        .container {
            max-width: 650px;
            width: 100%;
        }

        h1 {
            color: #f59e0b; /* 綺麗なゴールド */
            font-size: 32px;
            font-weight: 800;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
        }

        /* 🪙 コインカウンターを巨大なネオン風に */
        .counter-text {
            font-size: 72px;
            font-weight: 900;
            color: #10b981; /* エメラルドグリーン */
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.6);
            transition: color 0.5s, text-shadow 0.5s;
        }

        /* 🔘 ボタンのベースデザイン */
        .btn {
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); /* ふわっと動かす魔法 */
        }

        /* ⚡ マウスを乗せたとき（Hover）の浮き上がる演出 */
        .btn:hover {
            transform: translateY(-2px); /* 2px上に浮かす */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .btn-gacha {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%); /* 青からシアンのグラデ */
        }
        .btn-gacha:hover {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
        }

        .btn-reset {
            background-color: transparent;
            color: #64748b;
            font-size: 12px;
            padding: 6px 15px;
            border: 1px solid #334155;
            margin-top: 15px;
        }
        .btn-reset:hover {
            background-color: #ef4444;
            color: white;
            border-color: #ef4444;
        }

        .result-box {
            margin: 20px 0;
            font-size: 22px;
            font-weight: bold;
            color: #fbbf24;
            min-height: 40px;
            text-shadow: 0 0 8px rgba(251, 191, 36, 0.3);
        }

        /* ✍️ 2. タイピングエリア（グラスモフィズム：磨りガラス効果） */
        .typing-section {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.03); /* 超微細な白色を乗せる */
            backdrop-filter: blur(12px); /* 背景をボカす */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); /* 繊細な白い境界線 */
            padding: 30px 20px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }

        .typing-section h2 {
            font-size: 20px;
            margin-top: 0;
            color: #e2e8f0;
            letter-spacing: 1px;
        }

        /* 🔤 出題される英単語（フォントを美しく読みやすく） */
        .word-display {
            font-size: 48px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 3px;
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .meaning-display {
            font-size: 18px;
            color: #38bdf8; /* 明るい水色 */
            font-weight: 500;
            margin-bottom: 20px;
        }

        /* ⌨️ 入力ステータスの箱をクールなデザインに */
        .status-display {
            font-size: 24px;
            font-family: 'Consolas', monospace;
            font-weight: bold;
            color: #94a3b8;
            background-color: #0f172a;
            display: inline-block;
            padding: 12px 40px;
            border-radius: 16px;
            border: 1px solid #1e293b;
            min-width: 280px;
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 id="mainTitle">マイ・コインシステム</h1>
        <div class="subtitle">ターゲット1900の単語で稼げ！ 📄</div>

        <div id="coinCount" class="counter-text">0</div>

        <button class="btn btn-gacha" onclick="drawGacha()">ガチャを引く（30枚）</button>
        <div id="gachaResult" class="result-box"></div>

        <div class="typing-section">
            <h2>✍️ ターゲット1900 特訓タイピング</h2>
            <div id="wordDisplay" class="word-display">loading...</div>
            <div id="meaningDisplay" class="meaning-display">意味: 読み込み中</div>
            <div id="statusDisplay" class="status-display">ここにタイプしてね！</div>
        </div>

        <button class="btn btn-reset" onclick="resetData()">データをリセット</button>
    </div>

    <script src="words.js"></script>

    <script>
        let coin = Number(localStorage.getItem("savedCoin")) || 0;
        let currentWordData = {};
        let typedChars = "";

        function updateCoinDisplay() {
            document.getElementById("coinCount").innerText = coin;
            if (coin >= 10) {
                // 🪙 10コイン以上：ゴールドネオン
                document.getElementById("coinCount").style.color = "#fbbf24";
                document.getElementById("coinCount").style.textShadow = "0 0 20px rgba(251, 191, 36, 0.6)";
                document.getElementById("mainTitle").innerText = "✨ 億万長者への第一歩 ✨";
                document.getElementById("mainTitle").style.color = "#fbbf24";
            } else {
                // 🟢 初期状態：エメラルドネオン
                document.getElementById("coinCount").style.color = "#10b981";
                document.getElementById("coinCount").style.textShadow = "0 0 20px rgba(16, 185, 129, 0.6)";
                document.getElementById("mainTitle").innerText = "マイ・コインシステム";
                document.getElementById("mainTitle").style.color = "#f59e0b";
            }
        }

        function saveGame() {
            localStorage.setItem("savedCoin", coin);
        }

        function nextQuestion() {
            let randomIndex = Math.floor(Math.random() * wordList.length);
            currentWordData = wordList[randomIndex];
            typedChars = "";
            document.getElementById("wordDisplay").innerText = currentWordData.word;
            document.getElementById("meaningDisplay").innerText = "意味: " + currentWordData.meaning;
            document.getElementById("statusDisplay").innerText = "タイプしてね！";
            document.getElementById("statusDisplay").style.color = "#94a3b8";
        }

        window.addEventListener("keydown", function(event) {
            let pressedKey = event.key;
            if (pressedKey.length > 1) return;

            let nextCorrectChar = currentWordData.word[typedChars.length];

            if (pressedKey === nextCorrectChar) {
                typedChars = typedChars + pressedKey;
                let statusLabel = document.getElementById("statusDisplay");
                statusLabel.innerText = typedChars;
                statusLabel.style.color = "#10b981"; // 成功時はエメラルドグリーンに光る

                if (typedChars === currentWordData.word) {
                    coin = coin + 50;
                    updateCoinDisplay();
                    saveGame();
                    
                    statusLabel.innerText = "🎉 CLEAR! (+50枚)";
                    statusLabel.style.color = "#fbbf24"; // ゴールドに光る
                    setTimeout(nextQuestion, 1000);
                }
            } else {
                let statusLabel = document.getElementById("statusDisplay");
                statusLabel.innerText = typedChars + " ❌";
                statusLabel.style.color = "#ef4444"; // ミスは赤
            }
        });

        function drawGacha() {
            let resultLabel = document.getElementById("gachaResult");

            if (coin < 30) {
                resultLabel.innerText = "❌ コインが足りません！タイピングで勉強して稼ごう。";
                resultLabel.style.color = "#ef4444";
                return;
            }

            coin = coin - 30;
            updateCoinDisplay();
            saveGame();

            let 景品 = ["⭐超激レアの剣", "✨レアの盾", "📦普通の回復薬", "🌱そこら辺の草"];
            let randomIndex = Math.floor(Math.random() * 景品.length);
            let selectedItem = 景品[randomIndex];

            resultLabel.style.color = "#fbbf24";
            resultLabel.innerText = "ガチャン！ 当たったのは… 【 " + selectedItem + " 】！";
        }

        function resetData() {
            if (confirm("本当にセーブデータをリセットしますか？")) {
                localStorage.removeItem("savedCoin");
                coin = 0;
                updateCoinDisplay();
                document.getElementById("gachaResult").innerText = "";
            }
        }

        updateCoinDisplay();
        nextQuestion();
    </script>

</body>
</html>
